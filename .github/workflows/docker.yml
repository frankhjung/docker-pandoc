---
name: Build and Push Docker Image (Docker Hub and GHCR)

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["master"]
    tags-ignore: ["*"]
  check_run:
    types: [rerequested, requested_action]
  pull_request:
    branches: ["master"]
# yamllint enable

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Read version from project
        id: version
        run: |
          echo "PANDOC_VERSION=$(awk -F= '/^ARG PANDOC_VERSION=/{print $2; exit}' Dockerfile)" >> "$GITHUB_OUTPUT"

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: log in to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            frankhjung/pandoc:latest
            frankhjung/pandoc:${{ steps.version.outputs.PANDOC_VERSION }}
            frankhjung/pandoc:${{ github.sha }}
            ghcr.io/frankhjung/pandoc:latest
            ghcr.io/frankhjung/pandoc:${{ steps.version.outputs.PANDOC_VERSION }}
            ghcr.io/frankhjung/pandoc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
